{% load static %}
<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
        <meta name="viewport"
          content="width=device-width,
                   initial-scale=1.0">

        <title>ManoVijay</title>
        <style>
            body{
                background-image: url("{% static 'images/MonkBackgroundImage2.png' %}");
                background-size: cover;
                background-repeat: no-repeat;

            }
            .divtheme{
                background-color: rgba(240,240,240,0.5);
                border: solid;
                border-color: black;
                width: fit-content;
                height: fit-content;
            }
            .tdtheme{

                padding-left: 255px;
                padding-right:255px;
                height:10px;
                justify-content: center;
                transition-property: height;
                transition-duration: 1s;
                transition-timing-function: ease;
                text-transform: uppercase;
            }
            .tdtheme:hover{
                background-color: orange;
                border-radius: 40px;
                width: max-content;
                height: 50px;
                border: solid black;
            }
            a{
                text-decoration: none;
                color: black;
            }
            .imgtheme{
                position: absolute;
                bottom: 0px;
                right: 1px;
            }
            .timerdivtheme{
                border: solid black;
                background-color: bisque;
                width: fit-content;
            }
            .backarrowtheme{
                position: absolute;
                bottom:0px;
                left: 1px;
            }
            container {
            margin-top: 50px;

}

#timer {
font-size: 48px;
margin: 20px auto;
}

controls button {
margin: 5px;
padding: 10px 20px;
font-size: 16px;
}
        </style>


    </head>
    <body>
        <table>
            <tr>
                <td class="tdtheme"><a href="UserViewsBlogLink">Blogs</a></td>
                <td class="tdtheme"><a href="UserViewsPomodoroLink">Pomodoro Timer</a></td>
            </tr>
        </table>
        <div class="timerdivtheme">
        <div class="container">
            <h1>Pomodoro Timer</h1>
            <div id="timer">25:00</div>
            <div class="controls">
            <button id="start">Start</button>
            <button id="pause">Pause</button>
            <button id="resume">Resume</button>
            <button id="switch">Switch Mode</button>
            </div>
        </div>
        </div>
        <a href="LogoutLink"><img src="{% static "images/Logout logo 2.png" %}" class="imgtheme"/></a>
        <a href="UserDashboardReturnLink"><img src="{% static 'images/Back button.png' %}" class="backarrowtheme"/></a>
    <script>
            let workTime = 25 * 60; // Work time in seconds
let breakTime = 5 * 60; // Break time in seconds
let isWorkMode = true; // Track current mode
let timerInterval; // Store interval ID
let remainingTime = workTime;

const timerDisplay = document.getElementById("timer");
const startButton = document.getElementById("start");
const pauseButton = document.getElementById("pause");
const resumeButton = document.getElementById("resume");
const switchButton = document.getElementById("switch");

function updateTimerDisplay() {
const minutes = Math.floor(remainingTime / 60).toString().padStart(2, "0");
const seconds = (remainingTime % 60).toString().padStart(2, "0");
timerDisplay.textContent = `${minutes}:${seconds}`;
}

function startTimer() {
clearInterval(timerInterval);
timerInterval = setInterval(() => {
if (remainingTime > 0) {
remainingTime--;
updateTimerDisplay();
} else {
clearInterval(timerInterval);
alert(isWorkMode ? "Work session complete!" : "Break complete!");
}
}, 1000);
}

function pauseTimer() {
clearInterval(timerInterval);
}

function resumeTimer() {
startTimer();
}

function switchMode() {
isWorkMode = !isWorkMode;
remainingTime = isWorkMode ? workTime : breakTime;
updateTimerDisplay();
}

startButton.addEventListener("click", startTimer);
pauseButton.addEventListener("click", pauseTimer);
resumeButton.addEventListener("click", resumeTimer);
switchButton.addEventListener("click", switchMode);

updateTimerDisplay(); // Initialize display

        </script>
    </body>
</html>

        <style>
            body{
                background-image: url("{% static 'images/MonkBackgroundImage2.png' %}");

            .divtheme{
                background-color: rgba(240,240,240,0.5);

                border-color: black;

            }

                padding-left: 230px;

            .tdtheme:hover{

                border-radius: 40px;

                position: absolute;

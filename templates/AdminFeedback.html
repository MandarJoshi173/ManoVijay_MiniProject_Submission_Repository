{% load static %}
<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
        <title>ManoVijay</title>
        <style>
            body{
                background-image: url("{% static 'images/MonkBackgroundImage2.png' %}");
                background-size: cover;
                background-repeat: no-repeat;
            }
            .divtheme{
                background-color: rgba(240,240,240,0.5);
                border: solid;
                border-color: black;
                width: fit-content;
                height: fit-content;
            }
            .tdtheme{

                padding-left: 60px;
                padding-right:60px;
                height:10px;
                justify-content: center;
                transition-property: height;
                transition-duration: 1s;
                transition-timing-function: ease;
                text-transform: uppercase;
            }
            .tdtheme:hover{
                background-color: orange;
                border-radius: 40px;
                width: max-content;
                height: 50px;
                border: solid black;
            }
            a{
                text-decoration: none;
                color: black;
            }
            .imgtheme{
                position: absolute;
                bottom: 0px;
                right: 1px;

            }
            .backarrowtheme{
                position: absolute;
                bottom:0px;
                left:1px;
            }
        </style>

    </head>
    <body>
        <table>
            <tr>
                <td class="tdtheme"><a href="AdminBlogsLink"> Blogs</a></td>
                <td class="tdtheme"><a href="AdminRequestsLink"> Requests</a></td>
                <td class="tdtheme"><a href="AdminProfilesLink"> Profiles</a></td>
                <td class="tdtheme"><a href="AdminNotificationsLink"> Notifications</a></td>
                <td class="tdtheme"><a href="AdminFeedbacksLink"> Feedbacks</a></td>
            </tr>
        </table>
    <a href="AdminLogoutLink"><img src="{% static "images/Logout logo 2.png" %}" class="imgtheme"/></a>
    <div class="divtheme">
        <form method="post" action="AdminFeedbackActionCode">
            {% csrf_token %}
            <table>
                <tr>
                    <td><h3>Feedback View Form for Admin</h3></td>
                </tr>
                <tr>
                    <td>Select Feedback Type:</td>
                    <td><select name="feedbackType"><option>For Admin by Customer</option><option>For Admin by therapist</option></select></td>
                    <td><input type="submit" value="submit"/></td>
                </tr>

            </table>
        </form>
    </div>
    <div class="divtheme">
        <table>
            <tr>
                <td>feedbackId</td>
                <td>userId</td>
                <td>Feedback</td>
                <td>FeedbackType</td>
            </tr>
            {% for data in list %}
            <tr>
                <td>{{ data.0 }}</td>
                <td>{{ data.1 }}</td>
                <td>{{ data.2 }}</td>
                <td>{{ data.3 }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>
    <a href="TherapistDashboardReturnLink"><img src="{% static 'images/Back button.png' %}" class="backarrowtheme"/></a>
    </body>
</html>

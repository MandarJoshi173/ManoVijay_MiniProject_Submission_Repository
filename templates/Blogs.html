{% load static %}
<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
        <title>ManoVijay</title>
        <style>
            body{
                background-image: url("{% static 'images/MonkBackgroundImage2.png' %}");
                background-size: cover;
                background-repeat: no-repeat;
                font-family:Arial;
                margin:0;
                padding:30px;
            }
            .divtheme{
                background-color: rgba(240,240,240,0.5);
                border: solid;
                border-color: black;
                width: fit-content;
                height: fit-content;
            }
            .tdtheme{

                padding-left: 75px;
                padding-right:75px;
                height:10px;
                justify-content: center;
                transition-property: height;
                transition-duration: 1s;
                transition-timing-function: ease;
                text-transform: uppercase;
            }
            .tdtheme:hover{
                background-color: orange;
                border-radius: 40px;
                width: max-content;
                height: 50px;
                border: solid black;
            }
            a{
                text-decoration: none;
                color: black;
            }
            .imgtheme{
                position: fixed;
                bottom: 0px;
                right: 1px;

            }
            .backarrowtheme{
                position: fixed;
                bottom:0px;
                left:1px;
            }

        .heading{
        text-align:center;
        margin-bottom:30px;
        }

        .blog-card{
        width: fit-content;
        margin:auto;
        background:rgba(255,255,255,0.7);
            border: solid ;
            border-color: black;
        padding:25px;
        margin-bottom:20px;
        border-radius:10px;
        box-shadow:0px 0px 8px lightgray;
        }

        .blog-card h2{
        color:#2f3542;
        }

        .category{
        color:#1e90ff;
        font-weight:bold;
        margin-bottom:10px;
        }

        .content{
        line-height:1.6;
        color:#444;
        }

        .btn{
        display:block;
        width:150px;
        text-align:center;
        margin:30px auto;
        padding:10px;
        background:#2ed573;
        color:white;
        text-decoration:none;
        border-radius:5px;
        }
        </style>

    </head>
    <body>
        <table>
            <tr>
                <td class="tdtheme"><a href="UserProfileLink">Profile</a></td>
                <td class="tdtheme"><a href="UserViewLink">View</a></td>
                <td class="tdtheme"><a href="FeedbackLink">Feedback</a></td>
                <td class="tdtheme"><a href="UserAppointmentLink">Appointment</a></td>
                <td class="tdtheme"><a href="NotificationsLink">Notifications</a></td>
            </tr>
        </table>


{% for blog in blogs %}

<div class="blog-card">

<h2>{{ blog.1 }}</h2>

<p class="category">Category: {{ blog.2 }}</p>

<p class="content">{{ blog.3 }}</p>

</div>

{% endfor %}

<a href="UserDashboardReturnLink"><img src="{% static 'images/Back button.png' %}" class="backarrowtheme"/></a>


    <a href="LogoutLink"><img src="{% static "images/Logout logo 2.png" %}" class="imgtheme"/></a>
    </body>
</html>
